<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: rgb(5, 53, 61);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        button {
            background: #f5edd1;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            color: #444;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }
        button:hover {
            background: #ecdeb8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #fff;">Welcome</h1>
        <button onclick="window.location.href='envelope.html'">Открыть</button>
    </div>
</body>
</html>
